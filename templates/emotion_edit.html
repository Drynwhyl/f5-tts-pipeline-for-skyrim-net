{% extends "base.html" %}
{% block title %}Edit {{ character }} / {{ emotion }} — F5-TTS Manager{% endblock %}
{% block content %}
<div class="page-header">
  <h1>{{ character }} <span style="color:#8b949e;font-weight:400">/</span>
    <span class="emotion-badge {{ emotion }}">{{ emotion }}</span>
  </h1>
  <a href="/character/{{ character }}" class="btn btn-secondary">← Back</a>
</div>

<form method="POST" enctype="multipart/form-data">
  <div class="form-group">
    <label>Audio file (leave empty to keep current)</label>
    <input type="file" name="audio" accept=".wav,.mp3,.flac">
    <div style="margin-top:8px">
      <audio src="/audio/{{ character }}/{{ emotion }}" controls preload="none"></audio>
    </div>
  </div>

  <div class="form-group">
    <label>Reference text</label>
    <textarea name="text" rows="3">{{ text }}</textarea>
  </div>

  <div class="btn-group">
    <button type="submit" class="btn btn-primary">Save</button>
    <a href="/character/{{ character }}" class="btn btn-secondary">Cancel</a>
  </div>
</form>
{% endblock %}
